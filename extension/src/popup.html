<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Janai</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; width: 320px; padding: 16px; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .status { padding: 8px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
    .ok { background: #e6f4ea; color: #137333; }
    .warn { background: #fef7e0; color: #b06000; }
    .err { background: #fce8e6; color: #c5221f; }
    input { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 8px; }
    button { width: 100%; padding: 8px; background: #1a73e8; color: white; border: 0; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:disabled { background: #aac4eb; cursor: default; }
    .small { font-size: 11px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Janai</h1>
  <div id="status" class="status warn">Loading…</div>
  <input id="code" placeholder="6-digit pairing code" maxlength="6" autocomplete="off">
  <button id="pair" disabled>Pair with OmniHR</button>
  <div class="small">Get a code from your bot with <code>/pair</code>.</div>

  <hr style="margin: 14px 0; border: none; border-top: 1px solid #e0e0e0;">

  <div style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">Gmail & Calendar</div>
  <div id="google-status" class="status warn">Not connected</div>
  <input id="google-code" placeholder="6-digit code from /connect_google" maxlength="6" autocomplete="off">
  <button id="google-connect">Connect Google</button>
  <div class="small">Run <code>/connect_google</code> in your bot to get a code.</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
