name: Deploy to Oracle VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: oracle.seahyingcong.com
          username: opc
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/expensebot
            git pull
            docker compose up -d --build
