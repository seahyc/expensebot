services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expensebot
      POSTGRES_PASSWORD: expensebot
      POSTGRES_DB: expensebot
    ports: ["5432:5432"]
    volumes: ["./pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expensebot"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
