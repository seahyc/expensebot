services:
  expensebot:
    build: .
    image: expensebot:latest
    container_name: expensebot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./expensebot.db:/app/expensebot.db
      # Mount host's Claude Code for Agent SDK (subscription auth)
      - /home/opc/.claude:/root/.claude
      - /home/opc/.claude.json:/root/.claude.json
      - /usr/lib/node_modules/@anthropic-ai:/usr/lib/node_modules/@anthropic-ai:ro
      - /usr/bin/claude:/usr/local/bin/claude:ro
      - /usr/bin/node:/usr/local/bin/node:ro
    networks:
      - backend_default
    # exposed internally only; Caddy reverse-proxies to expensebot:8000

  whatsapp-bridge:
    build:
      context: ./services/whatsapp-bridge
      dockerfile: Dockerfile
    container_name: whatsapp-bridge
    ports:
      - "3001:3001"
    volumes:
      - ./data/whatsapp-auth:/app/auth
      - ./data/whatsapp-db:/app/db
    environment:
      - PORT=3001
      - AUTH_DIR=/app/auth
      - DB_PATH=/app/db/messages.db
    restart: unless-stopped
    networks:
      - backend_default

networks:
  backend_default:
    external: true
