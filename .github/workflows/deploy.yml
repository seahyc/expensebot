name: Deploy to Oracle VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/known_hosts <<'EOF'
          oracle.seahyingcong.com ssh-rsa 
          oracle.seahyingcong.com ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBA9g9aAwCu61eEwZo4CLwNQEo7enJyfobAvZV0YKHZQffP0JFKV2Vag8j3oXKwpT1NGLRLWUL5Hjprc9i5wc7p0=
          oracle.seahyingcong.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM1oVOXOMLhkqigZq38Xn/LjEEylYPIDBBhbcRbSsPaa
          EOF

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key opc@oracle.seahyingcong.com \
            'cd ~/expensebot && git pull && docker compose up -d --build'
